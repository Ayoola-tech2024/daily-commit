name: Daily Build

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "daily-commit-bot"
          git config user.email "damisileayoola@gmail.com"

      - name: Run daily build
        run: bash scripts/build.sh
