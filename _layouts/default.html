<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }} — {{ site.description }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://daily-commit.vercel.app{{ page.url }}">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ page.title | default: site.title }}">
  <meta name="twitter:description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="Daily Entry Journal RSS" href="/feed.xml">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Daily Entry Journal",
    "url": "https://daily-commit.vercel.app",
    "description": "One commit, every day — a year-long building journey",
    "author": {
      "@type": "Person",
      "name": "Ayoola Damisile"
    }
  }
  </script>
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>
  <header class="header">
    <div class="container header-inner">
      <a href="{{ site.baseurl }}/" class="header-title">{{ site.title }}</a>
      <div class="header-actions">
        <div class="search-wrapper">
          <input type="search" id="search-input" placeholder="Search builds..." class="search-input" aria-label="Search builds" aria-describedby="search-results">
          <div id="search-results" class="search-results" aria-live="polite"></div>
        </div>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">&#9790;</button>
      </div>
    </div>
  </header>

  <main id="main" class="container main">
    {{ content }}
  </main>
  <button id="back-to-top" class="back-to-top" aria-label="Back to top">↑</button>

  <footer class="footer">
    <div class="container footer-inner">
      <span>&copy; {{ site.time | date: '%Y' }} <a href="https://github.com/Ayoola-tech2024" target="_blank" rel="noopener">{{ site.author }}</a></span>
      <span class="footer-tagline">{{ site.description }}</span>
    </div>
  </footer>

  <script>
    (function() {
      // Theme toggle
      var saved = localStorage.getItem('theme');
      var prefers = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = saved || (prefers ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      updateToggle(theme);

      document.getElementById('theme-toggle').addEventListener('click', function() {
        var current = document.documentElement.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        updateToggle(next);
      });

      function updateToggle(t) {
        var btn = document.getElementById('theme-toggle');
        btn.textContent = t === 'dark' ? '\u2600\uFE0F' : '\uD83C\uDF19';
      }

      // Search functionality
      var searchInput = document.getElementById('search-input');
      if (searchInput) {
        searchInput.addEventListener('input', function(e) {
          var query = e.target.value.toLowerCase().trim();
          
          // Search table rows on index page
          var rows = document.querySelectorAll('table tr');
          var visible = 0;
          var total = rows.length;
          rows.forEach(function(row) {
            if (row.querySelector('th')) return; // Skip header row
            var text = row.textContent.toLowerCase();
            if (query === '' || text.indexOf(query) !== -1) {
              row.style.display = '';
              visible++;
            } else {
              row.style.display = 'none';
            }
          });
          
          // Also search month sections
          var sections = document.querySelectorAll('.month-section');
          sections.forEach(function(section) {
            var text = section.textContent.toLowerCase();
            if (query === '' || text.indexOf(query) !== -1) {
              section.style.display = '';
            } else {
              section.style.display = 'none';
            }
          });
          
          // Update aria-live region if exists
          var liveRegion = document.getElementById('search-results');
          if (liveRegion) {
            if (query) {
              liveRegion.textContent = 'Showing ' + visible + ' of ' + total + ' entries';
            } else {
              liveRegion.textContent = '';
            }
          }
        });
      }

      // Keyboard shortcuts
      document.addEventListener('keydown', function(e) {
        // "/" to focus search
        if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
          e.preventDefault();
          if (searchInput) searchInput.focus();
        }
        // Escape to clear search
        if (e.key === 'Escape' && document.activeElement === searchInput) {
          searchInput.value = '';
          searchInput.dispatchEvent(new Event('input'));
          searchInput.blur();
        }
      });

      // Back to top button
      var backToTop = document.getElementById('back-to-top');
      if (backToTop) {
        window.addEventListener('scroll', function() {
          if (window.scrollY > 300) {
            backToTop.classList.add('visible');
          } else {
            backToTop.classList.remove('visible');
          }
        });
        backToTop.addEventListener('click', function() {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      }
    })();
  </script>
</body>
</html>
